[versions]
agp = "8.2.2"
kotlin = "1.9.22"
compose = "1.6.1"
compose-compiler = "1.5.8"
activity-compose = "1.8.2"
paging-compose = "3.2.1"
nav-compose = "2.7.7"
constraint-layout-compose = "1.1.0"
font-awesome-compose = "1.1.0"
coil-compose = "2.5.0"
coroutines = "1.7.3"
lifecycle = "2.7.0"
flinger = "1.0.5"
paging = "3.2.1"
lottie = "6.3.0"
room = "2.6.1"
core-ktx = "1.12.0"
appcompat = "1.6.1"
palette-ktx = "1.0.0"
material = "1.11.0"
material3 = "1.2.1"
play-services-ads = "22.5.0"
play-services-maps = "18.2.0"
exoplayer = "2.19.1"
logging-interceptor = "4.12.0"
